<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Monuments — Memory Game</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: 'Inter', system-ui, sans-serif; overflow: hidden; }

    /* ── Card container ───────────────────────────────────────── */
    .card {
      perspective: 1000px;
      cursor: pointer;
      position: relative;
      height: 100%;          /* fills grid row */
      transform: rotate(var(--rot, 0deg));
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .card:not(.matched):not(.flipped):hover {
      transform: rotate(0deg) scale(1.1);
      z-index: 20;
    }

    /* ── Card flip ────────────────────────────────────────────── */
    .card-inner {
      position: relative; width: 100%; height: 100%;
      transition: transform 0.52s cubic-bezier(0.4, 0, 0.2, 1);
      transform-style: preserve-3d;
    }
    .card.flipped .card-inner,
    .card.matched .card-inner { transform: rotateY(180deg); }
    .card-face {
      position: absolute; inset: 0; border-radius: 16px;
      backface-visibility: hidden;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; overflow: hidden;
    }
    .card-front { transform: rotateY(180deg); }

    /* ── Card back design ─────────────────────────────────────── */
    .card-back {
      background:
        radial-gradient(circle at center, rgba(255,255,255,0.14) 1.5px, transparent 1.5px),
        linear-gradient(135deg, #7c3aed 0%, #4338ca 45%, #1d4ed8 100%);
      background-size: 20px 20px, 100% 100%;
      border: 2.5px solid rgba(139,92,246,0.5);
    }
    @keyframes backGlow {
      0%,100% { box-shadow: 0 0 10px rgba(139,92,246,0.3),  inset 0 0 18px rgba(99,102,241,0.12); }
      50%      { box-shadow: 0 0 22px rgba(139,92,246,0.55), inset 0 0 28px rgba(99,102,241,0.22); }
    }
    .card:not(.flipped):not(.matched) .card-back {
      animation: backGlow 3s ease-in-out infinite;
    }

    /* ── Matched glow ─────────────────────────────────────────── */
    .card.matched .card-front {
      outline: 3px solid #34d399;
      box-shadow: 0 0 0 3px #34d399, 0 0 28px rgba(52,211,153,0.55);
    }
    @keyframes matchBounce {
      0%,100% { transform: rotateY(180deg) scale(1); }
      45%     { transform: rotateY(180deg) scale(1.08); }
    }
    .card.matched .card-inner { animation: matchBounce 0.45s ease; }

    /* ── Mismatch shake ───────────────────────────────────────── */
    @keyframes shake {
      0%,100% { transform: rotateY(180deg) translateX(0); }
      25%     { transform: rotateY(180deg) translateX(-8px); }
      75%     { transform: rotateY(180deg) translateX(8px); }
    }
    .card.shake .card-inner { animation: shake 0.38s ease; }

    /* ── Card deal-in ─────────────────────────────────────────── */
    @keyframes cardDeal {
      from { opacity: 0; transform: rotate(var(--rot, 0deg)) scale(0.4) translateY(-20px); }
      to   { opacity: 1; transform: rotate(var(--rot, 0deg)) scale(1)   translateY(0); }
    }
    .card-deal { animation: cardDeal 0.46s cubic-bezier(0.34,1.56,0.64,1) both; }

    /* ── Score pop ────────────────────────────────────────────── */
    @keyframes scorePop {
      0%,100% { transform: scale(1); }
      50%     { transform: scale(1.55); color: #34d399; }
    }
    .score-pop { animation: scorePop 0.4s ease; }

    /* ── Player pulse ─────────────────────────────────────────── */
    @keyframes borderPulse {
      0%,100% { box-shadow: 0 0 0 2px var(--pc), 0 0 14px color-mix(in srgb, var(--pc) 40%, transparent); }
      50%     { box-shadow: 0 0 0 3px var(--pc), 0 0 24px color-mix(in srgb, var(--pc) 65%, transparent); }
    }
    .player-pulse { animation: borderPulse 2s ease-in-out infinite; }

    /* ── Status fade ──────────────────────────────────────────── */
    @keyframes fadeUp { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:none; } }
    .status-in { animation: fadeUp 0.22s ease; }

    /* ── Prominent control buttons ────────────────────────────── */
    .btn-game {
      display: flex; align-items: center; gap: 7px;
      padding: 10px 20px; border-radius: 14px; border: none; cursor: pointer;
      font-weight: 800; font-size: 0.88rem; white-space: nowrap;
      transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.15s;
    }
    .btn-game:hover  { transform: scale(1.07); }
    .btn-game:active { transform: scale(0.94); }
    .btn-restart {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      box-shadow: 0 4px 18px rgba(99,102,241,0.5);
    }
    .btn-restart:hover { box-shadow: 0 6px 26px rgba(99,102,241,0.7); }
    .btn-exit {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: #fff;
      box-shadow: 0 4px 18px rgba(239,68,68,0.45);
    }
    .btn-exit:hover { box-shadow: 0 6px 26px rgba(239,68,68,0.65); }

    /* ── Confetti ─────────────────────────────────────────────── */
    @keyframes confettiFall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity:1; }
      100% { transform: translateY(110vh)  rotate(800deg); opacity:0; }
    }
    .confetti { position: fixed; pointer-events: none; border-radius: 3px;
                animation: confettiFall linear forwards; z-index: 9999; }

    /* ── Win trophy ───────────────────────────────────────────── */
    @keyframes trophyEntrance {
      0%   { transform: scale(0) rotate(-20deg); opacity:0; }
      70%  { transform: scale(1.15) rotate(5deg); }
      100% { transform: scale(1) rotate(0deg);   opacity:1; }
    }
    .trophy-in { animation: trophyEntrance 0.7s cubic-bezier(0.34,1.56,0.64,1) forwards; }

    /* ── Input focus ──────────────────────────────────────────── */
    input:focus { outline: none; }
    .player-input:focus-within {
      border-color: rgba(99,102,241,0.7) !important;
      box-shadow: 0 0 0 3px rgba(99,102,241,0.2);
    }
  </style>
</head>

<!--  SETUP SCREEN                                                  -->
<!-- ══════════════════════════════════════════════════════════════ -->
<div id="setup-screen"
     class="flex items-center justify-center px-4"
     style="height:100vh;">
  <div class="w-full max-w-md">

    <div class="text-center mb-10">
      <div class="text-7xl mb-4 drop-shadow-lg">🌍</div>
      <h1 class="text-4xl font-black text-white tracking-tight">World Monuments</h1>
      <p class="text-2xl font-bold text-indigo-400 mt-1">Memory Game</p>
      <p class="text-slate-400 text-sm mt-3 leading-relaxed">
        Match famous landmarks from around the globe.<br>
        The player with the most pairs wins!
      </p>
    </div>

    <div class="space-y-3 mb-8">
      <div class="player-input flex items-center gap-3 rounded-2xl px-5 py-4 transition-all"

        <span class="text-2xl flex-shrink-0">🔴</span>
        <input id="p2-name" type="text" placeholder="Player 2 name" maxlength="16" autocomplete="off"

    <button onclick="startGame()"

      🚀 Start Game

    <div class="grid grid-cols-3 gap-3 mt-8">
      <div class="rounded-xl p-3 text-center" style="background:rgba(255,255,255,0.04);">
        <div class="text-2xl mb-1">🃏</div>
        <p class="text-xs text-slate-400 leading-snug">20 cards<br>10 pairs</p>
      </div>
      <div class="rounded-xl p-3 text-center" style="background:rgba(255,255,255,0.04);">
        <div class="text-2xl mb-1">🔄</div>
        <p class="text-xs text-slate-400 leading-snug">Take turns<br>flipping cards</p>
      </div>
      <div class="rounded-xl p-3 text-center" style="background:rgba(255,255,255,0.04);">
        <div class="text-2xl mb-1">⭐</div>
        <p class="text-xs text-slate-400 leading-snug">Match = point<br>+ extra turn!</p>
      </div>
    </div>

  </div>
</div>

<!--  GAME SCREEN — locked to 100vh, no scroll                     -->
<!-- ══════════════════════════════════════════════════════════════ -->
<div id="game-screen" class="hidden"
     style="height:100vh; display:flex; flex-direction:column; overflow:hidden; padding:12px 20px 10px;">

  <!-- ── Row 1: Score panels ─────────────────────────────────── -->
  <div class="flex items-stretch gap-3" style="margin-bottom:10px; flex-shrink:0;">

    <!-- P1 -->
    <div id="p1-panel" class="flex-1 rounded-2xl transition-all duration-300"
         style="--pc:#6366f1; background:rgba(99,102,241,0.14); border:2px solid rgba(99,102,241,0.4);
                padding:10px 16px; display:flex; align-items:center; gap:12px;">
      <span style="font-size:1.6rem;">🔵</span>
      <div class="flex-1 min-w-0">
        <div id="p1-label" class="text-white font-bold truncate" style="font-size:0.88rem;">Player 1</div>
        <div class="text-slate-500 font-medium uppercase tracking-wide" style="font-size:0.6rem;">pairs found</div>
      </div>

    <!-- Centre: pairs + VS + turn -->

      <div class="font-black text-slate-600" style="font-size:0.85rem;">VS</div>
      <div id="turn-chip" class="px-3 py-1 rounded-full font-black text-white whitespace-nowrap"
           style="font-size:0.68rem; background:linear-gradient(135deg,#6366f1,#8b5cf6);">Turn</div>
    </div>

    <!-- P2 -->
    <div id="p2-panel" class="flex-1 rounded-2xl transition-all duration-300"
         style="--pc:#ef4444; background:rgba(239,68,68,0.08); border:2px solid rgba(239,68,68,0.25);
                padding:10px 16px; display:flex; align-items:center; gap:12px; flex-direction:row-reverse;">
      <span style="font-size:1.6rem;">🔴</span>
      <div class="flex-1 min-w-0 text-right">
        <div id="p2-label" class="text-white font-bold truncate" style="font-size:0.88rem;">Player 2</div>
        <div class="text-slate-500 font-medium uppercase tracking-wide" style="font-size:0.6rem;">pairs found</div>
      </div>
      <div id="p2-score" class="font-black text-red-400" style="font-size:2.4rem; line-height:1;">0</div>
    </div>

  </div>

  <!-- ── Row 2: Prominent buttons + status ───────────────────── -->
  <div class="flex items-center gap-4" style="margin-bottom:10px; flex-shrink:0;">

    <button class="btn-game btn-restart" onclick="restartGame()">
      <span style="font-size:1.1rem;">🔀</span>
      Restart Game
    </button>

    <div id="status-msg" class="flex-1 text-center font-semibold text-slate-300 status-in"
         style="font-size:0.88rem; min-height:20px;"></div>

    <button class="btn-game btn-exit" onclick="exitGame()">
      <span style="font-size:1.1rem;">🚪</span>
      Exit to Menu
    </button>

  </div>

  <!-- ── Row 3: Card grid — fills ALL remaining space ────────── -->
  <div style="flex:1; min-height:0; overflow:visible;">
    <div id="card-grid"
         style="width:100%; height:100%;
                display:grid;
                grid-template-columns: repeat(5, 1fr);
                grid-template-rows:    repeat(4, 1fr);
                gap:12px;">
      <!-- Rendered by JS -->
    </div>
  </div>

</div>

<!--  SCRIPT                                                        -->
<!-- ══════════════════════════════════════════════════════════════ -->
<script>

  const MONUMENTS = [
    { id:1,  name:'Eiffel Tower',       location:'Paris, France',     emoji:'🗼', flag:'🇫🇷', bg:'linear-gradient(145deg,#ec4899,#be185d)' },
    { id:2,  name:'Taj Mahal',          location:'Agra, India',       emoji:'🕌', flag:'🇮🇳', bg:'linear-gradient(145deg,#f59e0b,#b45309)' },
    { id:3,  name:'Colosseum',          location:'Rome, Italy',       emoji:'🏛️', flag:'🇮🇹', bg:'linear-gradient(145deg,#fbbf24,#92400e)' },
    { id:4,  name:'Great Wall',         location:'China',             emoji:'🧱', flag:'🇨🇳', bg:'linear-gradient(145deg,#ef4444,#991b1b)' },
    { id:5,  name:'Statue of Liberty',  location:'New York, USA',     emoji:'🗽', flag:'🇺🇸', bg:'linear-gradient(145deg,#14b8a6,#0e7490)' },
    { id:6,  name:'Machu Picchu',       location:'Cusco, Peru',       emoji:'🏔️', flag:'🇵🇪', bg:'linear-gradient(145deg,#22c55e,#166534)' },
    { id:7,  name:'Big Ben',            location:'London, UK',        emoji:'🕰️', flag:'🇬🇧', bg:'linear-gradient(145deg,#3b82f6,#1e40af)' },
    { id:8,  name:'Sydney Opera House', location:'Sydney, Australia', emoji:'🎭', flag:'🇦🇺', bg:'linear-gradient(145deg,#38bdf8,#0369a1)' },
    { id:9,  name:'Sagrada Família',    location:'Barcelona, Spain',  emoji:'⛪', flag:'🇪🇸', bg:'linear-gradient(145deg,#a855f7,#6b21a8)' },
    { id:10, name:'Neuschwanstein',     location:'Bavaria, Germany',  emoji:'🏰', flag:'🇩🇪', bg:'linear-gradient(145deg,#eab308,#854d0e)' },
  ];

  let ST = {};

  function initState(players) {
    const deck = shuffle([...MONUMENTS, ...MONUMENTS].map((m, i) => ({ ...m, cardIdx: i })));
    ST = { deck, flipped: [], matched: new Set(), scores: [0, 0], currentPlayer: 0, players, locked: false };
  }

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // ── Start / Restart / Exit ──────────────────────────────────────
  function startGame() {
    const p1 = document.getElementById('p1-name').value.trim() || 'Player 1';
    const p2 = document.getElementById('p2-name').value.trim() || 'Player 2';
    initState([p1, p2]);
    show('game-screen');
    document.getElementById('p1-label').textContent = p1;
    document.getElementById('p2-label').textContent = p2;
    document.getElementById('p1-score').textContent = '0';
    document.getElementById('p2-score').textContent = '0';
    renderBoard();
    syncUI();
    setStatus(`🌟 ${ST.players[0]}, you go first — flip a card!`);
  }

  function restartGame() {
    initState(ST.players);
    document.getElementById('p1-score').textContent = '0';
    document.getElementById('p2-score').textContent = '0';
    renderBoard();
    syncUI();
    setStatus(`🔀 Reshuffled! ${ST.players[0]}, you go first!`);
  }

  function restartFromWin() {
    document.getElementById('win-trophy').classList.remove('trophy-in');
    show('game-screen');
    restartGame();
  }

  function exitGame() {
    document.getElementById('p1-name').value = ST.players?.[0] !== 'Player 1' ? ST.players[0] : '';
    document.getElementById('p2-name').value = ST.players?.[1] !== 'Player 2' ? ST.players[1] : '';
    document.getElementById('win-trophy').classList.remove('trophy-in');
    show('setup-screen');
  }

  // ── Render board ────────────────────────────────────────────────
  function renderBoard() {
    const grid = document.getElementById('card-grid');
    grid.innerHTML = ST.deck.map((card, idx) => {
      const rot   = (Math.random() * 10 - 5).toFixed(1);
      const delay = (idx * 0.04).toFixed(2);
      return `
      <div class="card card-deal" id="c${idx}" onclick="flip(${idx})"
           style="--rot:${rot}deg; animation-delay:${delay}s;">
        <div class="card-inner">

          <!-- Back face -->
          <div class="card-face card-back">
            <div style="position:absolute;top:7px;left:9px;  font-size:0.9rem;opacity:0.5;">✦</div>
            <div style="position:absolute;top:7px;right:9px; font-size:0.9rem;opacity:0.5;">✦</div>
            <div style="position:absolute;bottom:7px;left:9px;  font-size:0.7rem;opacity:0.35;">✦</div>
            <div style="position:absolute;bottom:7px;right:9px; font-size:0.7rem;opacity:0.35;">✦</div>
            <div style="font-size:3.2rem;color:white;font-weight:900;line-height:1;
                        text-shadow:0 0 22px rgba(167,139,250,0.9),0 0 44px rgba(99,102,241,0.6);">?</div>
            <div style="font-size:0.55rem;color:rgba(196,181,253,0.85);font-weight:800;
                        letter-spacing:0.22em;margin-top:7px;">MEMORY</div>
          </div>

          <!-- Front face -->
          <div class="card-face card-front" style="background:${card.bg};border:2.5px solid rgba(255,255,255,0.2);">
            <div style="position:absolute;top:6px;right:8px;font-size:1.3rem;line-height:1;
                        filter:drop-shadow(0 1px 3px rgba(0,0,0,0.4));">${card.flag}</div>
            <div style="font-size:4.2rem;line-height:1;margin-top:6px;
                        filter:drop-shadow(0 4px 8px rgba(0,0,0,0.4));">${card.emoji}</div>
            <div style="font-size:0.78rem;color:#fff;font-weight:900;text-align:center;
                        padding:0 8px;margin-top:8px;line-height:1.25;
                        text-shadow:0 1px 4px rgba(0,0,0,0.5);">${card.name}</div>
            <div style="font-size:0.58rem;color:rgba(255,255,255,0.65);text-align:center;
                        margin-top:3px;line-height:1.2;padding:0 6px;">${card.location}</div>
          </div>

        </div>
      </div>`;
    }).join('');
  }

  // ── Flip logic ──────────────────────────────────────────────────
  function flip(idx) {
    if (ST.locked) return;
    if (ST.matched.has(idx)) return;
    if (ST.flipped.includes(idx)) return;
    if (ST.flipped.length >= 2) return;
    document.getElementById(`c${idx}`).classList.add('flipped');
    ST.flipped.push(idx);
    if (ST.flipped.length === 2) { ST.locked = true; setTimeout(evaluate, 1000); }
  }

  function evaluate() {
    const [i, j] = ST.flipped;
    const a = ST.deck[i], b = ST.deck[j];
    if (a.id === b.id) {
      ST.matched.add(i); ST.matched.add(j);
      ST.scores[ST.currentPlayer]++;
      document.getElementById(`c${i}`).classList.add('matched');
      document.getElementById(`c${j}`).classList.add('matched');
      popScore(ST.currentPlayer);
      updatePairsLabel();
      ST.flipped = []; ST.locked = false;
      if (ST.matched.size === ST.deck.length) { setTimeout(endGame, 700); }
      else { setStatus(`🎉 Match! ${ST.players[ST.currentPlayer]} goes again!`); syncActivePlayer(); }
    } else {
      const el1 = document.getElementById(`c${i}`);
      const el2 = document.getElementById(`c${j}`);
      el1.classList.add('shake'); el2.classList.add('shake');
      const next = ST.currentPlayer === 0 ? 1 : 0;
      setStatus(`❌ No match — ${ST.players[next]}'s turn!`);
      setTimeout(() => {
        el1.classList.remove('flipped','shake');
        el2.classList.remove('flipped','shake');
        ST.flipped = []; ST.currentPlayer = next; ST.locked = false;
        syncActivePlayer();
      }, 950);
    }
  }

  // ── UI helpers ──────────────────────────────────────────────────
  function syncUI() { syncActivePlayer(); updatePairsLabel(); }

  function syncActivePlayer() {
    const p = ST.currentPlayer;
    const p1 = document.getElementById('p1-panel');
    const p2 = document.getElementById('p2-panel');
    const chip = document.getElementById('turn-chip');
    if (p === 0) {
      p1.style.background = 'rgba(99,102,241,0.22)'; p1.style.borderColor = '#6366f1';
      p1.classList.add('player-pulse');
      p2.style.background = 'rgba(239,68,68,0.08)';  p2.style.borderColor = 'rgba(239,68,68,0.25)';
      p2.classList.remove('player-pulse');
      chip.textContent = `🔵 ${ST.players[0]}`;
      chip.style.background = 'linear-gradient(135deg,#6366f1,#8b5cf6)';
    } else {
      p2.style.background = 'rgba(239,68,68,0.2)'; p2.style.borderColor = '#ef4444';
      p2.classList.add('player-pulse');
      p1.style.background = 'rgba(99,102,241,0.1)'; p1.style.borderColor = 'rgba(99,102,241,0.3)';
      p1.classList.remove('player-pulse');
      chip.textContent = `🔴 ${ST.players[1]}`;
      chip.style.background = 'linear-gradient(135deg,#ef4444,#dc2626)';
    }
  }

  function updatePairsLabel() {
    document.getElementById('pairs-label').textContent =
      `${ST.matched.size / 2} / ${MONUMENTS.length} pairs`;
  }

  function popScore(idx) {
    const el = document.getElementById(`p${idx+1}-score`);
    el.textContent = ST.scores[idx];
    el.classList.remove('score-pop'); void el.offsetWidth; el.classList.add('score-pop');
  }

  function setStatus(msg) {
    const el = document.getElementById('status-msg');
    el.textContent = msg;
    el.classList.remove('status-in'); void el.offsetWidth; el.classList.add('status-in');
  }

  // ── End game ────────────────────────────────────────────────────
  function endGame() {
    const [s0, s1] = ST.scores, [n0, n1] = ST.players;
    const tie = s0 === s1, winnerIdx = s0 > s1 ? 0 : 1;
    show('win-screen');
    const trophy = document.getElementById('win-trophy');
    trophy.textContent = tie ? '🤝' : '🏆'; trophy.style.opacity = '0';
    setTimeout(() => { trophy.style.opacity = '1'; trophy.classList.add('trophy-in'); }, 50);
    document.getElementById('win-name').textContent = tie ? "It's a Tie!" : ST.players[winnerIdx];
    document.getElementById('win-msg').textContent = tie
      ? `Both players found ${s0} pair${s0!==1?'s':''}. What a game!`
      : `Found ${ST.scores[winnerIdx]} pairs to win! 🎊`;
    const col0 = winnerIdx===0&&!tie ? '#6366f1' : 'rgba(99,102,241,0.35)';
    const col1 = winnerIdx===1&&!tie ? '#ef4444' : 'rgba(239,68,68,0.3)';
    document.getElementById('win-scores').innerHTML = `
      <div class="flex-1 rounded-2xl px-5 py-4 text-center"
           style="background:rgba(99,102,241,0.14);border:2px solid ${col0};">
        <div class="text-white font-bold text-sm truncate mb-1">${n0}</div>
        <div class="text-4xl font-black text-indigo-400">${s0}</div>
        <div class="text-[10px] text-slate-500 mt-1">pairs</div>
      </div>
      <div class="flex-1 rounded-2xl px-5 py-4 text-center"
           style="background:rgba(239,68,68,0.1);border:2px solid ${col1};">
        <div class="text-white font-bold text-sm truncate mb-1">${n1}</div>
        <div class="text-4xl font-black text-red-400">${s1}</div>
        <div class="text-[10px] text-slate-500 mt-1">pairs</div>
      </div>`;
    if (!tie) setTimeout(launchConfetti, 200);
  }

  // ── Confetti ────────────────────────────────────────────────────
  function launchConfetti() {
    const colors = ['#6366f1','#f59e0b','#10b981','#ef4444','#8b5cf6','#ec4899','#38bdf8','#22c55e','#fbbf24'];
    for (let i = 0; i < 100; i++) {
      const el = document.createElement('div');
      el.className = 'confetti';
      const size = 6 + Math.random() * 10;
      el.style.cssText = `left:${Math.random()*100}vw;top:-15px;width:${size}px;height:${size}px;
        background:${colors[Math.floor(Math.random()*colors.length)]};
        animation-duration:${1.8+Math.random()*2}s;animation-delay:${Math.random()*0.8}s;
        border-radius:${Math.random()>0.5?'50%':'3px'};`;
      document.body.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }
  }

  // ── Screen helper ───────────────────────────────────────────────
  function show(id) {
    ['setup-screen','game-screen','win-screen'].forEach(s =>
      document.getElementById(s).classList.toggle('hidden', s !== id));
  }

</script>
</body>
</html>
